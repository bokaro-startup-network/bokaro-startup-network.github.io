{{ $ := hugo.Data.site.hero }}
<section class="hero">
  <canvas id="hero-canvas" class="hero-canvas" aria-hidden="true"></canvas>
  <div class="hero-fade" aria-hidden="true"></div>
  <div class="wrap hero-inner">
    <p class="eyebrow"><span class="spark" aria-hidden="true"></span>{{ $.eyebrow }}</p>
    <h1 class="hero-headline">{{ $.headline }}</h1>
    <p class="hero-sub">{{ $.subheadline }}</p>
    <div class="hero-ctas">
      <a class="btn btn-primary" href="#join">{{ $.cta_primary }}</a>
      <a class="btn btn-ghost" href="#network">{{ $.cta_secondary }}</a>
    </div>
  </div>
  <div class="scroll-cue" aria-hidden="true"><span></span></div>
</section>
