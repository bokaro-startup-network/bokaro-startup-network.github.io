<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}{{ if not .IsHome }} · {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ site.Params.description }}">
  <meta property="og:title" content="{{ site.Title }}">
  <meta property="og:description" content="{{ site.Params.description }}">
  <meta name="theme-color" content="#0d0f12">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2242%22 fill=%22%230d0f12%22/><circle cx=%2250%22 cy=%2250%22 r=%2216%22 fill=%22%23f5a623%22/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  {{ $css := resources.Get "css/main.css" }}
  {{ if hugo.IsProduction }}
    {{ $css = $css | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
  {{ else }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}">
  {{ end }}
</head>
