{{ $ := hugo.Data.site.network }}
<section class="network-section" id="network">
  <div class="wrap">
    <div class="section-head" data-reveal>
      <h2>{{ $.heading }}</h2>
      <p class="lede">{{ $.lede }}</p>
    </div>
    <div class="chip-row" id="network-filters" role="group" aria-label="Filter by member type">
      <button class="chip is-active" data-filter="all" type="button">Everyone</button>
      {{ range $.nodes }}
      <button class="chip" data-filter="{{ .id }}" type="button">{{ .short }}</button>
      {{ end }}
    </div>
    <div class="path-finder" data-reveal>
      <div class="path-finder-row">
        <label class="path-field">
          <span>I'm a</span>
          <select id="path-from">
            <option value="">choose one</option>
            {{ range $.nodes }}<option value="{{ .id }}">{{ .short }}</option>{{ end }}
          </select>
        </label>
        <span class="path-finder-arrow" aria-hidden="true">&rarr;</span>
        <label class="path-field">
          <span>looking to meet a</span>
          <select id="path-to">
            <option value="">choose one</option>
            {{ range $.nodes }}<option value="{{ .id }}">{{ .short }}</option>{{ end }}
          </select>
        </label>
        <button class="btn btn-primary btn-small" id="path-find" type="button">Show the connection</button>
      </div>
      <p class="path-caption" id="path-caption"></p>
    </div>
  </div>
  <div class="network-stage">
    <canvas id="network-canvas" aria-hidden="true"></canvas>
    <div class="network-tooltip" id="network-tooltip" role="status" aria-live="polite"></div>
  </div>
</section>

<script type="application/json" id="network-data">
{{ jsonify $.nodes | safeJS }}
</script>
