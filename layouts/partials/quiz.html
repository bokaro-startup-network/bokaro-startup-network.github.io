<section class="quiz" id="quiz">
  <div class="wrap">
    <div class="quiz-card" data-reveal>
      <div class="quiz-panel" id="quiz-intro">
        <span class="quiz-eyebrow">30-second match</span>
        <h2>Which node are you?</h2>
        <p class="lede">Answer three quick questions and we'll place you on the network below.</p>
        <button class="btn btn-primary" id="quiz-start" type="button">Start the quiz</button>
      </div>
      <div class="quiz-panel" id="quiz-questions" hidden>
        <div class="quiz-progress" id="quiz-progress" aria-hidden="true"></div>
        <div id="quiz-question"></div>
      </div>
      <div class="quiz-panel" id="quiz-result" hidden></div>
    </div>
  </div>
</section>
