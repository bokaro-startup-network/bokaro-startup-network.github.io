hero:
  eyebrow: "Bokaro Startup & Business Network"
  headline: "Great businesses are rarely built alone."
  subheadline: "They're forged — through conversations, partnerships, mentorship, and the right network. Bokaro Startup & Business Network brings founders, entrepreneurs, business owners, and professionals together to learn, collaborate, solve problems, and create opportunities."
  cta_primary: "Join the Community"
  cta_secondary: "See who's inside"

stats:
  - value: 95
    label: "Community Members"
